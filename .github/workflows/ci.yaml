name: CI Checks

on:
  push:

jobs:
  # ジョブ1: ESLintでのコードスタイルチェック
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run linter
        run: npm run lint

  # ジョブ2: Prettierでのフォーマットチェック
  format-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24" # プロジェクトに合わせて変更してください
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run formatter check
        run: npm run format:check

  # ジョブ3: Astro/TypeScriptの型チェック
  type-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24" # プロジェクトに合わせて変更してください
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run type check
        run: npm run typecheck
